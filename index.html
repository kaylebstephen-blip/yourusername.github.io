<!DOCTYPE html>
<html>
<head>
  <title>Kayleb’s Game Hub</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0b0f19;
      color: #e6e6e6;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    header {
      background: #111827;
      padding: 25px;
      font-size: 36px;
      font-weight: bold;
      border-bottom: 3px solid #1f2937;
      border-radius: 0 0 20px 20px;
      color: #60a5fa;
    }

    .content {
      padding: 50px 20px;
    }

    h2 {
      font-size: 30px;
      margin-bottom: 20px;
      color: #93c5fd;
    }

    p {
      font-size: 18px;
      color: #cbd5e1;
    }

    .game-button {
      display: block;
      margin: 20px auto;
      padding: 18px 25px;
      width: 260px;
      background: #1e293b;
      color: #e2e8f0;
      text-decoration: none;
      border-radius: 15px;
      font-size: 20px;
      transition: 0.25s;
      border: 2px solid #334155;
    }

    .game-button:hover {
      background: #334155;
      border-color: #60a5fa;
      color: #60a5fa;
    }

    footer {
      margin-top: 60px;
      padding: 20px;
      background: #111827;
      border-top: 3px solid #1f2937;
      border-radius: 20px 20px 0 0;
      font-size: 14px;
      color: #64748b;
    }
  </style>
</head>

<body>

  <header>
    Kayleb’s Game Hub
  </header>

  <div class="content">
    <h2>Welcome</h2>
    <p>Your games will appear here once you add them.</p>

    <!-- Game links will go here later -->
    <a class="game-button" href="#">Game 1 (coming soon)</a>
    <a class="game-button" href="#">Game 2 (coming soon)</a>
  </div>

  <footer>
    © 2026 Kayleb — All rights reserved
  </footer>

</body>
</html>
